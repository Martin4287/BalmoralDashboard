<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ocupación Hotelera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card w-full max-w-md p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Registro de Ocupación</h1>
        
        <form id="occupancyForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
                <input type="date" id="fecha" required 
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ocupación (Pax Hotel)</label>
                <input type="number" id="ocupacion" placeholder="Ej: 45" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Enviar a la Planilla
            </button>
        </form>

        <div id="status" class="mt-6 hidden p-4 rounded-lg text-center font-medium"></div>
        
        <div class="mt-8 text-center">
            <a href="/" class="text-blue-600 hover:underline text-sm">← Volver al Dashboard</a>
        </div>
    </div>

    <script>
        // Configura aquí tu URL si no se detecta automáticamente
        const SCRIPT_URL = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI";

        document.getElementById('fecha').valueAsDate = new Date();

        document.getElementById('occupancyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const fechaVal = document.getElementById('fecha').value;
            const ocupacionVal = document.getElementById('ocupacion').value;

            // Formatear fecha a dd/mm/yyyy
            const [y, m, d] = fechaVal.split('-');
            const formattedDate = `${d}/${m}/${y}`;

            btn.disabled = true;
            btn.innerText = "Enviando...";
            status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-blue-100 text-blue-700";
            status.innerText = "Procesando envío...";
            status.classList.remove('hidden');

            try {
                // Intentamos obtener la URL de la configuración si no está hardcodeada
                const finalUrl = SCRIPT_URL.includes("TU_URL") ? prompt("Por favor, pega la URL de tu Google Apps Script:") : SCRIPT_URL;
                
                if (!finalUrl || !finalUrl.startsWith("http")) {
                    throw new Error("URL de script no válida");
                }

                await fetch(finalUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        fecha: formattedDate,
                        ocupacion: Number(ocupacionVal),
                        tipo: 'OCUPACION'
                    })
                });

                status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-green-100 text-green-700";
                status.innerText = "¡Éxito! Los datos se han enviado a la planilla.";
                document.getElementById('ocupacion').value = '';
            } catch (error) {
                status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-700";
                status.innerText = "Error al enviar: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar a la Planilla";
            }
        });
    </script>
</body>
</html>
